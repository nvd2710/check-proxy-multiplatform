name: Build iOS IPA (unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build shared framework (release)
        working-directory: .
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-daemon

      - name: Build iOS app archive
        working-directory: iosApp
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/iosApp.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        working-directory: iosApp
        run: |
          mkdir -p build/Payload
          cp -r build/iosApp.xcarchive/Products/Applications/iosApp.app build/Payload/
          cd build && zip -r CheckProxy-unsigned.ipa Payload && cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheckProxy-ipa
          path: iosApp/build/CheckProxy-unsigned.ipa
          retention-days: 30
