name: Build iOS IPA (unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Cache Kotlin/Native dependencies (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build shared framework (release)
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-daemon

      - name: Install xcbeautify (cleaner log output)
        run: which xcbeautify || brew install xcbeautify

      - name: Build iOS app archive
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/iosApp.xcarchive \
            -allowProvisioningUpdates \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: iosApp/xcodebuild.log
          retention-days: 7

      - name: Package unsigned IPA
        working-directory: iosApp
        run: |
          echo "--- archive contents ---"
          ls -R build/iosApp.xcarchive/ || true
          echo "--- searching for .app ---"
          APP_PATH=$(find build/iosApp.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            exit 1
          fi
          echo "Found app bundle at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r CheckProxy-unsigned.ipa Payload && cd ..
          ls -lh CheckProxy-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheckProxy-ipa
          path: iosApp/build/CheckProxy-unsigned.ipa
          retention-days: 30
